<?xml version="1.0" encoding="UTF-8"?>
<!-- Scatter mark, primary variant (app icon / GDM greeter / welcome splash).
     Refined from scatter.svg: tighter satellite spacing, stronger connective
     ring, subtle inner glow. Best between 48px and 512px. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256"
     role="img" aria-label="Scatter">
  <defs>
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#00ff88" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- soft aura behind the primary -->
  <circle cx="128" cy="128" r="44" fill="url(#inner-glow)" opacity="0.5"/>

  <!-- connective ring (subtle, implied coherence) -->
  <circle cx="128" cy="128" r="68" fill="none"
          stroke="#00ff88" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- three satellites: journal / audit / watts -->
  <circle cx="128" cy="60" r="6.5" fill="#00ff88"/>
  <circle cx="186.9" cy="162" r="6.5" fill="#00ff88"/>
  <circle cx="69.1" cy="162" r="6.5" fill="#00ff88"/>

  <!-- primary: the machine -->
  <circle cx="128" cy="128" r="18" fill="#00ff88" filter="url(#glow-soft)" opacity="0.8"/>
  <circle cx="128" cy="128" r="16" fill="#00ff88"/>
</svg>
